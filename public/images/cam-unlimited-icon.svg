<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="16" fill="#EDE7F6" stroke="#D1C4E9" stroke-width="1"/>
  <!-- Cloud shape -->
  <ellipse cx="100" cy="65" rx="35" ry="22" fill="#FFFFFF" stroke="#B39DDB" stroke-width="2"/>
  <ellipse cx="75" cy="72" rx="20" ry="15" fill="#FFFFFF" stroke="none"/>
  <ellipse cx="125" cy="72" rx="20" ry="15" fill="#FFFFFF" stroke="none"/>
  <ellipse cx="100" cy="75" rx="38" ry="14" fill="#FFFFFF" stroke="#B39DDB" stroke-width="2"/>
  <!-- Cloud top outline fix -->
  <ellipse cx="100" cy="65" rx="35" ry="22" fill="#FFFFFF" stroke="#B39DDB" stroke-width="2"/>
  <rect x="65" y="65" width="70" height="18" fill="#FFFFFF"/>
  <ellipse cx="100" cy="78" rx="38" ry="10" fill="#FFFFFF" stroke="#B39DDB" stroke-width="2"/>
