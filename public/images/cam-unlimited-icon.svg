  <path d="M82 68 Q82 58 92 58 Q100 58 100 68 Q100 58 108 58 Q118 58 118 68 Q118 78 108 78 Q100 78 100 68 Q100 78 92 78 Q82 78 82 68 Z" fill="none" stroke="#7E57C2" stroke-width="2.5"/>
